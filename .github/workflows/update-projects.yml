name: Update Projects

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate projects section
        uses: actions/github-script@v7
        with:
          script: |
            const username = "0x-mpkane6";

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              type: "owner",
              sort: "updated",
              per_page: 100
            });

            const filtered = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name !== username)
              .slice(0, 6);

            let cards = `<table>\n`;

            for (let i = 0; i < filtered.length; i += 2) {
              cards += `  <tr>\n`;

              for (const repo of filtered.slice(i, i + 2)) {
                cards += `    <td width="50%" align="center">\n`;
                cards += `      <a href="${repo.html_url}">\n`;
                cards += `        <img src="https://github-readme-stats.vercel.app/api/pin/?username=${username}&repo=${repo.name}&theme=github_dark&hide_border=false&border_color=58a6ff&title_color=58a6ff&text_color=c9d1d9&bg_color=0d1117" />\n`;
                cards += `      </a>\n`;
                cards += `    </td>\n`;
              }

              if (filtered.slice(i, i + 2).length === 1) {
                cards += `    <td width="50%"></td>\n`;
              }

              cards += `  </tr>\n`;
            }

            cards += `</table>`;

            const fs = require("fs");
            const readmePath = "README.md";
            let readme = fs.readFileSync(readmePath, "utf8");

            const start = "<!-- PROJECTS:START -->";
            const end = "<!-- PROJECTS:END -->";

            const newSection = `${start}\n${cards}\n${end}`;

            const regex = new RegExp(`${start}[\\s\\S]*?${end}`);

            if (regex.test(readme)) {
              readme = readme.replace(regex, newSection);
            } else {
              readme += `\n\n<h2 align="left">🚀 My Projects</h2>\n\n${newSection}\n`;
            }

            fs.writeFileSync(readmePath, readme);

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update projects section"
